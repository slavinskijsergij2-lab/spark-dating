<!DOCTYPE html>
<html lang="{{ lang if lang is defined else 'ru' }}" {% if rtl is defined and rtl %}dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Spark — Знакомства{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .gradient-pink { background: linear-gradient(135deg, #f472b6 0%, #ec4899 50%, #db2777 100%); }
    .card-shadow { box-shadow: 0 20px 60px rgba(236,72,153,0.15); }
    .swipe-card { transform-origin: center bottom; transition: transform 0.3s ease; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  {% if request.url.path not in ['/login', '/register', '/'] %}
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-2xl font-bold text-pink-500">💘 Spark</a>
      <div class="flex gap-4 items-center">
        <a href="/swipe" class="text-gray-600 hover:text-pink-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </a>
        <a href="/matches" class="text-gray-600 hover:text-pink-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </a>
        <a href="/profile/edit" class="text-gray-600 hover:text-pink-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </a>
        <form method="POST" action="/logout" class="inline">
          <button type="submit" class="text-gray-400 hover:text-red-500 transition-colors text-sm">
            {% if t is defined %}{{ t.logout }}{% else %}Выйти{% endif %}
          </button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-lg mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
