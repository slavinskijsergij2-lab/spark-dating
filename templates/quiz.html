{% extends "base.html" %}
{% block title %}{{ t.quiz_title }} — Spark{% endblock %}

{% block head %}
<style>
  .cat-lifestyle     { --cat-bg:#f0fdf4; --cat-border:#86efac; --cat-text:#166534; }
  .cat-values        { --cat-bg:#faf5ff; --cat-border:#d8b4fe; --cat-text:#6b21a8; }
  .cat-communication { --cat-bg:#eff6ff; --cat-border:#93c5fd; --cat-text:#1e40af; }
  .cat-romance       { --cat-bg:#fff1f2; --cat-border:#fda4af; --cat-text:#9f1239; }
  .cat-personality   { --cat-bg:#fefce8; --cat-border:#fde047; --cat-text:#854d0e; }
  .category-badge { background:var(--cat-bg); border:1.5px solid var(--cat-border); color:var(--cat-text); }
  .cat-dot { width:7px; height:7px; border-radius:50%; background:#e5e7eb; transition:all .25s; }
  .cat-dot.done    { background:#ec4899; }
  .cat-dot.current { background:#ec4899; transform:scale(1.5); }
</style>
{% endblock %}

{% block content %}
<div id="quiz-root"></div>

<script>
(function() {
  var questions = {{ questions | tojson | safe }};
  var answeredIds = new Set({{ answered_ids | tojson | safe }});
  var tr = {{ t | tojson | safe }};
  var total = questions.length;
  var currentIndex = 0;
  var selected = {};
  var saving = false;
  var done = false;

  var catMeta = {
    lifestyle:     { icon: '🌿' },
    values:        { icon: '💎' },
    communication: { icon: '💬' },
    romance:       { icon: '❤️' },
    personality:   { icon: '✨' },
  };
  var catOrder = ['lifestyle', 'values', 'communication', 'romance', 'personality'];

  while (currentIndex < total - 1 && answeredIds.has(questions[currentIndex].id)) {
    currentIndex++;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function catKey() { return (questions[currentIndex] || {}).category || 'lifestyle'; }
  function catIcon() { return (catMeta[catKey()] || {}).icon || '❓'; }
  function catName() { return tr['quiz_cat_' + catKey()] || catKey(); }

  function render() {
    var root = document.getElementById('quiz-root');
    if (!root) return;

    if (done) {
      root.innerHTML =
        '<div class="mt-6 bg-gradient-to-r from-pink-50 to-purple-50 border border-pink-200 rounded-2xl p-6 text-center">' +
          '<div class="text-4xl mb-2">🎉</div>' +
          '<p class="font-bold text-gray-800 mb-1">' + escHtml(tr.quiz_done || 'Готово!') + '</p>' +
          '<a href="/matches" class="gradient-pink text-white px-6 py-2.5 rounded-full font-semibold text-sm inline-block mt-3 hover:opacity-90 transition">' +
            escHtml(tr.my_matches || 'Матчи') + ' →</a>' +
        '</div>';
      return;
    }

    var q = questions[currentIndex];
    if (!q) return;
    var qid = q.id;
    var selIdx = selected[qid];
    var opts = q.options.map(function(k) { return tr[k] || k; });
    var cat = catKey();
    var catClass = 'cat-' + cat;
    var pct = Math.round((currentIndex / total) * 100);

    // Category progress dots
    var dotsHtml = catOrder.map(function(name) {
      var grp = questions.map(function(qq, i) { return qq.category === name ? i : -1; }).filter(function(i) { return i >= 0; });
      if (!grp.length) return '';
      return '<div class="flex items-center gap-1">' +
        grp.map(function(qIdx) {
          var cls = 'cat-dot' + (qIdx < currentIndex ? ' done' : qIdx === currentIndex ? ' current' : '');
          return '<div class="' + cls + '"></div>';
        }).join('') +
      '</div>';
    }).join('');

    // Answer options
    var optsHtml = opts.map(function(opt, idx) {
      var isSelected = selIdx === idx;
      var cls = isSelected
        ? 'border-pink-400 bg-pink-50 ring-2 ring-pink-200 text-pink-700 font-semibold'
        : 'border-gray-200 bg-white text-gray-700 hover:border-pink-200 hover:bg-pink-50';
      var letter = ['A','B','C','D'][idx] || String(idx + 1);
      return '<button onclick="quizSelect(' + idx + ')" ' +
        'class="text-left border-2 rounded-xl px-4 py-3 transition text-sm flex items-center gap-3 ' + cls + '">' +
        '<span class="text-gray-300 font-mono text-xs w-4 flex-shrink-0">' + letter + '</span>' +
        '<span>' + escHtml(opt) + '</span></button>';
    }).join('');

    var nextDisabled = (selIdx === undefined || saving) ? 'disabled' : '';
    var nextLabel = currentIndex < total - 1
      ? (escHtml(tr.quiz_next || 'Далее') + ' →')
      : ('✓ ' + escHtml(tr.quiz_submit || 'Готово'));

    var prevBtn = currentIndex > 0
      ? '<button onclick="quizPrev()" class="flex-1 border-2 border-gray-200 text-gray-600 py-3 rounded-full font-semibold hover:border-gray-300 transition text-sm">← ' + escHtml(tr.back || 'Назад') + '</button>'
      : '';

    root.innerHTML =
      '<div class="flex items-center justify-between mb-3">' +
        '<div class="category-badge px-3 py-1.5 rounded-full text-sm font-semibold flex items-center gap-1.5 ' + catClass + '">' +
          catIcon() + '  ' + escHtml(catName()) +
        '</div>' +
        '<span class="text-gray-400 text-sm font-medium">' + (currentIndex + 1) + ' / ' + total + '</span>' +
      '</div>' +
      '<div class="w-full bg-gray-100 rounded-full h-2 mb-2">' +
        '<div class="gradient-pink h-2 rounded-full transition-all duration-400" style="width:' + pct + '%"></div>' +
      '</div>' +
      '<div class="flex justify-center gap-2 mb-6">' + dotsHtml + '</div>' +
      '<div class="bg-white rounded-2xl card-shadow p-6 mb-5">' +
        '<p class="text-xs font-bold uppercase tracking-widest mb-3 opacity-50">' + catIcon() + '  ' + escHtml(catName()) + '</p>' +
        '<h2 class="text-lg font-bold text-gray-800 mb-5">' + escHtml(tr[q.key] || q.key) + '</h2>' +
        '<div class="flex flex-col gap-3">' + optsHtml + '</div>' +
      '</div>' +
      '<div class="flex gap-3">' +
        prevBtn +
        '<button onclick="quizNext()" ' + nextDisabled + ' ' +
          'class="flex-1 gradient-pink text-white py-3 rounded-full font-semibold hover:opacity-90 transition disabled:opacity-50 text-sm">' +
          (saving ? '...' : nextLabel) +
        '</button>' +
      '</div>';
  }

  window.quizSelect = function(idx) {
    selected[questions[currentIndex].id] = idx;
    render();
  };

  window.quizPrev = function() {
    if (currentIndex > 0) { currentIndex--; render(); }
  };

  window.quizNext = function() {
    var q = questions[currentIndex];
    var answerIdx = selected[q.id];
    if (answerIdx === undefined || saving) return;

    saving = true;
    render();

    fetch('/quiz/answer', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-csrf-token': getCsrfToken()},
      body: JSON.stringify({question_id: q.id, answer_index: answerIdx}),
    })
    .then(function() { answeredIds.add(q.id); })
    .catch(function() {})
    .finally(function() {
      saving = false;
      if (currentIndex < total - 1) {
        currentIndex++;
        while (currentIndex < total - 1 && answeredIds.has(questions[currentIndex].id)) {
          currentIndex++;
        }
      } else {
        done = true;
        setTimeout(function() { window.location.href = '/matches'; }, 2500);
      }
      render();
    });
  };

  render();
})();
</script>
{% endblock %}
