{% extends "base.html" %}
{% block title %}{{ t.register_button }} — Spark{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh]">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-3xl font-bold text-pink-500">💘 Spark</a>
      <p class="text-gray-500 mt-2">{{ t.create_account }}</p>
    </div>

    <div class="bg-white rounded-2xl card-shadow p-8">
      <form method="POST" action="/register">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ t.email }}</label>
          <input type="email" name="email" required placeholder="your@email.com"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" />
        </div>
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ t.password }}</label>
          <input type="password" name="password" required placeholder="{{ t.password_placeholder }}"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">{{ t.language_label }}</label>
          <div class="grid grid-cols-3 gap-2" x-data="{ selected: 'en' }">
            <input type="hidden" name="language" x-bind:value="selected" />

            <template x-for="lang in [
              { code: 'ru', flag: '🇷🇺', label: 'Русский' },
              { code: 'uk', flag: '🇺🇦', label: 'Українська' },
              { code: 'de', flag: '🇩🇪', label: 'Deutsch' },
              { code: 'en', flag: '🇬🇧', label: 'English' },
              { code: 'tr', flag: '🇹🇷', label: 'Türkçe' },
              { code: 'ar', flag: '🇸🇦', label: 'العربية' }
            ]" :key="lang.code">
              <button type="button"
                @click="selected = lang.code"
                :class="selected === lang.code
                  ? 'border-pink-400 bg-pink-50 ring-2 ring-pink-300'
                  : 'border-gray-200 bg-white hover:border-pink-200 hover:bg-pink-50'"
                class="flex flex-col items-center justify-center py-3 px-2 rounded-xl border-2 transition cursor-pointer">
                <span class="text-2xl mb-1" x-text="lang.flag"></span>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight" x-text="lang.label"></span>
              </button>
            </template>
          </div>
        </div>

        <button type="submit"
                class="w-full gradient-pink text-white py-3 rounded-full font-semibold text-lg shadow hover:opacity-90 transition">
          {{ t.register_button }}
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        {{ t.already_have_account }}
        <a href="/login" class="text-pink-500 font-medium hover:underline">{{ t.login_button }}</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
